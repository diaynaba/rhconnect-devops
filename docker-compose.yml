version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: rhconnect-postgres
    environment:
      POSTGRES_DB: rhconnect
      POSTGRES_USER: rhconnect_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rhconnect-net
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rhconnect_user -d rhconnect"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./rhconnect-backend
      dockerfile: Dockerfile
    container_name: rhconnect-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/rhconnect
      SPRING_DATASOURCE_USERNAME: rhconnect_user
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: 86400000
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rhconnect-net
    restart: always

  frontend:
    build:
      context: ./rhconnect-frontend
      dockerfile: Dockerfile
    container_name: rhconnect-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost/api
    depends_on:
      - backend
    networks:
      - rhconnect-net
    restart: always

  nginx:
    image: nginx:alpine
    container_name: rhconnect-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - rhconnect-net
    restart: always

  prometheus:
    image: prom/prometheus:latest
    container_name: rhconnect-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - rhconnect-net
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: rhconnect-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - rhconnect-net
    restart: always

  jenkins:
    image: jenkins/jenkins:lts
    container_name: rhconnect-jenkins
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
    networks:
      - rhconnect-net
    restart: always

volumes:
  postgres_data:
  grafana_data:
  jenkins_data:

networks:
  rhconnect-net:
    driver: bridge
